name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS universal
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: npm install

      - name: Build universal app
        run: npm run tauri -- build --target universal-apple-darwin
        working-directory: apps/desktop
        env:
          # Optional: set these secrets to produce a signed + notarized build.
          # Leave unset for an unsigned build (fine for direct distribution).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flint-${{ github.ref_name }}-macOS
          path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          generate_release_notes: true
          draft: false
          # Tags containing a hyphen (v1.0.0-beta.1) are marked pre-release automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}
